    <!-- Advanced SEO: Brand Authority & Sitelinks Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "YENEGE",
      "alternateName": "Yenege Events",
      "url": "https://yenege.com",
      "logo": "https://yenege.com/logo.png",
      "sameAs": [
        "https://instagram.com/yenege_event",
        "https://linkedin.com/company/yenege",
        "https://facebook.com/yenege",
        "https://youtube.com/@yenegeevents",
        "https://t.me/yenegeevents",
        "https://tiktok.com/@yenegeevents"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+251978639887",
        "contactType": "customer service",
        "areaServed": "ET",
        "availableLanguage": ["Amharic", "English"]
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://yenege.com",
      "name": "YENEGE",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://yenege.com/events?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) for Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "YENEGE",
      "image": "https://yenege.com/logo.png",
      "@id": "https://yenege.com",
      "url": "https://yenege.com",
      "telephone": "+251978639887",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Amir Commercial Complex, 12th Floor, Office No. 12-003, Gabon St (Olympia)",
        "addressLocality": "Addis Ababa",
        "addressRegion": "Bole Sub-city",
        "postalCode": "1000",
        "addressCountry": "ET"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 9.0054,
        "longitude": 38.7636
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "08:00",
        "closes": "18:00"
      },
      "description": "YENEGE is one of East Africa's leading architects of culture and events, specializing in professional event production and expert education through the Yenege Event Academy."
    }
    </script>

    <!-- Resource Hints for Performance -->
    <link rel="dns-prefetch" href="https://www.google.com" />

    <link rel="preconnect" href="https://www.google.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    
    <!-- Preload critical resources -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/logo.png" fetchpriority="high" />
    
    <title>Yenege | Professional Event Production & Academy Addis Ababa</title>
  </head>
